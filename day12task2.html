<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Master Color Picker</title>
  
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    #app {
      border: 1px solid #ccc;
      padding: 20px;
      border-radius: 8px;
      width: 350px;
    }

    #color-form {
      margin-bottom: 20px;
    }

    #swatch-container {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .swatch {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s;
    }

    .swatch:hover {
      transform: scale(1.1);
      border: 2px solid #333;
    }

    #target-box {
      width: 100%;
      height: 150px;
      border: 2px solid #ccc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s;
    }

    #nested-btn {
      margin-top: 15px;
      padding: 5px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="app">
    <h2>JS Events Color Picker</h2>

    <form id="color-form">
      <label for="hex-input">Custom Hex:</label>
      <input type="text" id="hex-input" placeholder="#RRGGBB" />
      <button type="submit">Apply</button>
    </form>

    <div id="swatch-container">
      <div class="swatch" data-color="#FF5733" style="background: #FF5733;"></div>
      <div class="swatch" data-color="#33FF57" style="background: #33FF57;"></div>
      <div class="swatch" data-color="#3357FF" style="background: #3357FF;"></div>
      <div class="swatch" data-color="#F333FF" style="background: #F333FF;"></div>
    </div>

    <div id="target-box">
      <p>Double-click to reset</p>
      
      <button id="nested-btn">Click Me </button>
    </div>
  </div>

  <script>
    
    const form = document.getElementById('color-form');
    const hexInput = document.getElementById('hex-input');
    const swatchContainer = document.getElementById('swatch-container');
    const targetBox = document.getElementById('target-box');
    const nestedBtn = document.getElementById('nested-btn');

    function updateColor(color) {
      targetBox.style.backgroundColor = color;
    }


    swatchContainer.addEventListener('click', function(event) {
      if (event.target.classList.contains('swatch')) {
        const color = event.target.getAttribute('data-color');
        updateColor(color);
        console.log(`Swatch clicked: ${color}`);
      }
    });


    targetBox.addEventListener('mouseover', () => {
      targetBox.style.border = '4px dashed #333';
      console.log('Mouse is over the box');
    });

    targetBox.addEventListener('mouseout', () => {
      targetBox.style.border = '2px solid #ccc';
      console.log('Mouse left the box');
    });

    targetBox.addEventListener('dblclick', () => {
      updateColor('transparent'); // Reset the color
      console.log('Box reset via dblclick');
    });

 
    form.addEventListener('submit', (event) => {
      event.preventDefault(); 
      updateColor(hexInput.value);
      console.log(`Form submitted. Color changed to: ${hexInput.value}`);
    });

    hexInput.addEventListener('focus', () => {
      console.log('Input is currently focused (active)');
    });

    hexInput.addEventListener('blur', () => {
      console.log('Input lost focus (blurred)');
    });

    // 'input' fires every time a keystroke changes the value
    hexInput.addEventListener('input', (event) => {
      console.log(`Live typing: ${event.target.value}`);
    });

    hexInput.addEventListener('change', () => {
      console.log('Input value finalized (change event triggered)');
    });


    hexInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        console.log('Enter key was pressed down');
      }
    });

    hexInput.addEventListener('keyup', (event) => {
      console.log(`Key released: ${event.key}`);
    });


    targetBox.addEventListener('click', () => {
      console.log('1. Target Box Clicked (Capturing Phase)');
    }, true);

    targetBox.addEventListener('click', () => {
      console.log('3. Target Box Clicked (Bubbling Phase)');
    });

    nestedBtn.addEventListener('click', (event) => {
      event.stopPropagation(); 
      console.log('2. Nested Button Clicked - Propagation Stopped!');
      console.log('Notice how the Bubbling Phase log for the Target Box did NOT fire.');
    });
  </script>
</body>
</html>
