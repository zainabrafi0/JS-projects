<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 2rem auto; }
        .completed { text-decoration: line-through; color: #bf1d71; }
        li { margin: 10px 0; display: flex; align-items: center; gap: 10px; }
        .task-text { flex-grow: 1; }
    </style>
</head>
<body>

    <h2>Task Manager</h2>
    
    <input type="text" id="taskInput" placeholder="What needs to be done?">
    <button id="addBtn">Add Task</button>
    
    <ul id="taskList"></ul>

    <script>
        // 1. Selecting elements (getElementById)
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');

        // Function to handle adding a task
        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') return; // Prevent empty tasks

            // 2. Creating elements (createElement)
            const li = document.createElement('li');
            const span = document.createElement('span');
            const completeBtn = document.createElement('button');
            const deleteBtn = document.createElement('button');

            // 3. Modifying content (textContent)
            span.textContent = text;
            span.className = 'task-text'; // Modifying attributes via property
            completeBtn.textContent = 'Complete';
            deleteBtn.textContent = 'Delete';

            // 4. Modifying styles/classes (.classList.toggle)
            completeBtn.addEventListener('click', () => {
                span.classList.toggle('completed');
            });

            // 5. Removing elements (remove)
            deleteBtn.addEventListener('click', () => {
                li.remove(); 
            });

            // 6. Inserting elements (appendChild)
            li.appendChild(span);
            li.appendChild(completeBtn);
            li.appendChild(deleteBtn);
            
            taskList.appendChild(li);

            // Clear the input field after adding
            taskInput.value = '';
            taskInput.focus();
        }

        // Listen for click on the Add button
        addBtn.addEventListener('click', addTask);

        // Optional: Allow pressing "Enter" to add a task
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
    </script>
</body>
</html>
